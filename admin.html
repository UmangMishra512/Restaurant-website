<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | The Sky Cafe</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: #0b0b0b; color: #f5f5f5; }
        .admin-container { padding: 100px 20px 60px; max-width: 1000px; margin: 0 auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #d4af37; padding-bottom: 20px; margin-bottom: 30px; }
        .admin-header h1 { font-family: 'Playfair Display', serif; color: #d4af37; font-size: 2.5rem; }
        
        /* Auth View */
        #auth-view { display: flex; justify-content: center; align-items: center; min-height: 60vh; }
        .auth-card { background: rgba(22, 22, 22, 0.9); padding: 40px; border-radius: 12px; border: 1px solid rgba(212, 175, 55, 0.3); width: 100%; max-width: 400px; }
        .auth-card h2 { color: #d4af37; font-family: 'Playfair Display', serif; margin-bottom: 20px; text-align: center; }
        
        /* Dashboard View */
        #dashboard-view { display: none; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: rgba(22, 22, 22, 0.7); padding: 25px; border-radius: 8px; border-left: 4px solid #d4af37; }
        .stat-card h3 { color: #a3a3a3; font-size: 1rem; font-weight: 500; margin-bottom: 10px; }
        .stat-card .value { font-size: 2.5rem; font-weight: 700; color: #f5f5f5; }
        
        /* Data Tables */
        .section-title { font-family: 'Playfair Display', serif; color: #d4af37; margin-bottom: 20px; font-size: 1.8rem; }
        .table-responsive { overflow-x: auto; margin-bottom: 50px; background: rgba(22, 22, 22, 0.5); border-radius: 8px; padding: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: rgba(212, 175, 55, 0.1); padding: 12px 15px; color: #d4af37; font-weight: 600; border-bottom: 1px solid rgba(212, 175, 55, 0.3); }
        td { padding: 12px 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); color: #d0d0d0; }
        tr:hover td { background: rgba(255, 255, 255, 0.03); }
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .status-pending { background: rgba(255, 171, 0, 0.2); color: #ffab00; border: 1px solid #ffab00; }
        .status-confirmed { background: rgba(81, 207, 102, 0.2); color: #51cf66; border: 1px solid #51cf66; }
        
        /* Actions */
        .action-btn { background: none; border: 1px solid #d4af37; color: #d4af37; padding: 5px 10px; border-radius: 4px; cursor: pointer; transition: all 0.3s; font-size: 0.8rem; }
        .action-btn:hover { background: #d4af37; color: #0b0b0b; }
        
        .loading { text-align: center; color: #d4af37; padding: 40px; display: none; }
    </style>
</head>
<body>
    <nav class="navbar scrolled">
        <div class="container nav-container">
            <a href="index.html" class="logo">The Sky Cafe</a>
            <div class="nav-links" id="admin-nav" style="display: none;">
                <a href="#" id="logout-btn">Logout</a>
            </div>
        </div>
    </nav>

    <div class="admin-container">
        <!-- Auth View -->
        <div id="auth-view">
            <div class="auth-card">
                <h2>Admin Login</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="adminEmail">Email</label>
                        <input type="email" id="adminEmail" required>
                    </div>
                    <div class="form-group">
                        <label for="adminPassword">Password</label>
                        <input type="password" id="adminPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Login</button>
                    <span class="error-msg" id="loginError"></span>
                </form>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view">
            <div class="admin-header">
                <h1>Dashboard</h1>
                <p>Welcome back, Admin</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Today's Reservations</h3>
                    <div class="value" id="stat-today">0</div>
                </div>
                <div class="stat-card">
                    <h3>Pending Reservations</h3>
                    <div class="value" id="stat-pending">0</div>
                </div>
                <div class="stat-card">
                    <h3>Total Menu Items</h3>
                    <div class="value" id="stat-menu">42</div>
                </div>
            </div>

            <div id="loading" class="loading">Loading data...</div>

            <div id="data-container">
                <h2 class="section-title">Recent Reservations</h2>
                <div class="table-responsive">
                    <table id="reservationsTable">
                        <thead>
                            <tr>
                                <th>Date & Time</th>
                                <th>Name</th>
                                <th>Phone</th>
                                <th>Guests</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Data populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/admin.js"></script>
</body>
</html>
